name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.9 = macOS system python that Claude Desktop launches the MCP server with
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: python -m pytest tests/ -q
      - name: Hook syntax
        run: bash -n hooks/session-start.sh
      - name: Plugin manifests are valid JSON
        run: |
          python -c "import json; json.load(open('.claude-plugin/plugin.json')); json.load(open('.claude-plugin/marketplace.json'))"

  # The dashboard app (scripts/dashboard_app.py) has runtime deps (fastapi/uvicorn) and is
  # tested under them here. The stdlib `test` job above skips the app tests (importorskip),
  # so the dependency-free parts stay verified on the macOS system python (3.9).
  test-app:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.9 backs the module's "Python 3.9+" claim (the macOS system python); 3.12 = venv target
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -q

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
